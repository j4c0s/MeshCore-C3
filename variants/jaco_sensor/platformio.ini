[env:jaco-sensor]
extends = esp32_base
board = esp32-c3-devkitm-1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/jaco_sensor>
  +<../examples/simple_sensor/*.cpp>
  +<helpers/sensors>
build_flags =
  ${esp32_base.build_flags}
  -I variants/jaco_sensor
  -D ESP32_CPU_FREQ=80
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D LORA_TX_POWER=22
  -D LORA_SCK=2
  -D LORA_MISO=3
  -D LORA_MOSI=4
  -D LORA_NSS=10
  -D LORA_RST=7
  -D LORA_BUSY=6
  -D LORA_DIO1=5
  -D P_LORA_SCLK=2
  -D P_LORA_MISO=3
  -D P_LORA_MOSI=4
  -D P_LORA_NSS=10
  -D P_LORA_RESET=7
  -D P_LORA_BUSY=6
  -D P_LORA_DIO_1=5
  -D PIN_BOARD_SDA=8
  -D PIN_BOARD_SCL=9
  -D ENV_INA3221_ADDRESS=0x40
  -D ENV_INCLUDE_INA3221=1
  -D ENV_INCLUDE_AHTX0=1
  -D ENV_INCLUDE_GPS=1
  -D ENV_SKIP_GPS_DETECT=1
  -D LORA_FREQ=869.618
  -D LORA_BW=62.5
  -D LORA_SF=8
  -D LORA_CR=8
  -D ADVERT_NAME=\"jaco-sensor\"
  -D ADMIN_PASSWORD=\"514203\"
  -D ENABLE_ADVERT_ON_BOOT=1
  -D PIN_GPS_TX=20
  -D PIN_GPS_RX=21
  -D GPS_BAUD_RATE=9600
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}
  ${esp32_ota.lib_deps}
  bakercp/CRC32 @ ^2.0.0
