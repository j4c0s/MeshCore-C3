[super_mini_ra62]
extends = esp32_base
board = esp32-c3-devkitm-1
build_flags =
  ${esp32_base.build_flags}
  -I variants/super_mini_ra62
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D ESP32_CPU_FREQ=80
  -D LORA_TX_POWER=22
  -D P_LORA_DIO_1=3
  -D P_LORA_NSS=8
  -D P_LORA_RESET=5
  -D P_LORA_DIO_0=RADIOLIB_NC
  -D P_LORA_DIO_2=RADIOLIB_NC
  -D P_LORA_BUSY=4
  -D P_LORA_SCLK=10
  -D P_LORA_MISO=6
  -D P_LORA_MOSI=7
  -D SX126X_DIO2_AS_RF_SWITCH=true
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/super_mini_ra62>

[env:super_mini_ra62_repeater]
extends = super_mini_ra62
build_flags =
  ${super_mini_ra62.build_flags}
  -D ADVERT_NAME='"SuperMini Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${super_mini_ra62.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${super_mini_ra62.lib_deps}
  ${esp32_ota.lib_deps}
